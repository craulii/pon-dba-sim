[General]
network = pon_dba_sim.PONNetwork
ned-path = ../src
sim-time-limit = 10s
warmup-period = 1s
repeat = 10
seed-set = ${repetition}

# Resultados
result-dir = results
output-scalar-file = results/${configname}-${runnumber}.sca
output-vector-file  = results/${configname}-${runnumber}.vec

# Visualización Qtenv
qtenv-default-config = IPACT_16ONU
qtenv-default-run = 0

# Parámetros por defecto de la red
**.dataRate = 1Gbps
**.guardTime = 1us
**.pollingCycleTime = 2ms
**.maxGrantSize = 15000
**.urllcRate = 5Mbps
**.mmtcRate = 0.5Mbps
**.bufferSize_eMBB = 1048576
**.bufferSize_URLLC = 102400
**.bufferSize_mMTC = 512000
**.wfqWeightEMBB = 0.7
**.wfqWeightMMTC = 0.3
**.urllcDeadline = 10ms

# Configurar vectores: solo guardar latencia y jitter (los más relevantes)
**.latency_*.vector-recording = true
**.jitter_*.vector-recording   = true
**.cycleTime.vector-recording  = true

# ============================================================
# Configuraciones de escenarios
# ============================================================

[Config IPACT_16ONU]
description = "IPACT con 16 ONUs, variando carga eMBB"
**.numONUs = 16
**.dbaAlgorithm = "IPACT"
**.embbRate = ${load=25, 50, 100, 150, 200}Mbps

[Config QoSDBA_16ONU]
description = "QoS-DBA con 16 ONUs, variando carga eMBB"
**.numONUs = 16
**.dbaAlgorithm = "QoSDBA"
**.embbRate = ${load=25, 50, 100, 150, 200}Mbps

[Config IPACT_32ONU]
description = "IPACT con 32 ONUs, variando carga eMBB"
**.numONUs = 32
**.dbaAlgorithm = "IPACT"
**.embbRate = ${load=25, 50, 100, 150, 200}Mbps

[Config QoSDBA_32ONU]
description = "QoS-DBA con 32 ONUs, variando carga eMBB"
**.numONUs = 32
**.dbaAlgorithm = "QoSDBA"
**.embbRate = ${load=25, 50, 100, 150, 200}Mbps

# Configuración rápida para pruebas (1s, sin repeticiones)
[Config QuickTest]
description = "Prueba rápida IPACT 4 ONUs"
sim-time-limit = 2s
warmup-period = 0.2s
repeat = 1
**.numONUs = 4
**.dbaAlgorithm = "IPACT"
**.embbRate = 100Mbps

[Config QuickTest_QoSDBA]
description = "Prueba rápida QosDBA 4 ONUs"
sim-time-limit = 2s
warmup-period = 0.2s
repeat = 1
**.numONUs = 4
**.dbaAlgorithm = "QoSDBA"
**.embbRate = 100Mbps
